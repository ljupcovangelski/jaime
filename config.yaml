options:
  mode:
    type: string
    description: >
      Operating mode.
      'observe': collect context and generate reports only.
      'suggest': like observe, plus calls the AI provider to append diagnosis
        and safe manual remediation suggestions to the report. Nothing is executed.
      'act': like suggest, plus executes commands returned by the AI that match
        the act-command-allowlist. All executions are audited.
    default: observe
  provider:
    type: string
    description: "AI provider to use for optional report generation. Use 'none' for no provider."
    default: none
  model:
    type: string
    description: "AI model name used by the selected provider (optional)."
    default: ""
  api-token:
    type: string
    description: "Reference to Juju secret containing the provider API token. Must not be logged."
    default: ""
  watch-statuses:
    type: string
    description: "Comma-separated principal unit statuses that should open an incident."
    default: "error,blocked"
  failure-timeout-minutes:
    type: int
    description: "How long a watched status must persist before a report is generated."
    default: 5
  cooldown-minutes:
    type: int
    description: "Minimum time before generating another report for the same unresolved incident."
    default: 30
  log-window-minutes:
    type: int
    description: "How far back Jaime should collect recent logs (minutes)."
    default: 120
  max-context-lines:
    type: int
    description: "Maximum number of log/context lines to include in a report context bundle."
    default: 500
  report-dir:
    type: string
    description: "Directory where Markdown or JSON report artifacts are written."
    default: /var/log/jaime/reports
  audit-log-path:
    type: string
    description: "Path to the structured JSONL audit log."
    default: /var/log/jaime/events.jsonl
  ai-report-enabled:
    type: boolean
    description: "Whether AI-assisted report generation is enabled."
    default: false
  diagnostics:
    type: string
    description: >
      JSON monitoring plan describing what to collect (log files, processes,
      env vars, network ports, systemd units, health commands). When empty,
      Jaime attempts to generate this plan via AI on relation-joined. See
      the diagnostic schema in src/jaime/diagnostics.py for the expected format.
    default: ""
