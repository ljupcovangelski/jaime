name: jaime
summary: Jaime — Juju AI Medic Engine
description: |
  Jaime is a Juju machine subordinate charm that observes related principal units,
  collects bounded diagnostic context, and writes structured incident reports.
version: "0.0.5"
type: charm

subordinate: true

requires:
  principal:
    interface: juju-info
    scope: container

base: ubuntu@24.04
platforms:
  ubuntu-24.04-amd64:
    build-on: [amd64]
    build-for: [amd64]

# This satisfies the validation constraint while using the correct plugin type
parts:
  charm:
    plugin: charm
    source: .
    override-prime: |
      craftctl default
      chmod +x $CRAFT_PRIME/dispatch
      chmod +x $CRAFT_PRIME/src/charm.py

analysis:
  ignore:
    linters:
      - entrypoint